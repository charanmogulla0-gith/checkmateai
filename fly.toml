# fly.toml app configuration file generated for checkmate-ai on 2026-04-22T14:38:32-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'checkmate-ai'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[processes]
  app = 'uvicorn checkmate.main:app --host 0.0.0.0 --port 8000'
  # Wrap in sh -c so $REDIS_URL expands — Fly runs commands directly, not via shell.
  worker = 'sh -c "rq worker reviews --url $REDIS_URL"'

[http_service]
  internal_port = 8000
  force_https = true
  # Keep one app machine warm so GitHub's 10s webhook timeout doesn't hit our
  # ~10s cold-boot (2.8GB image with torch/transformers takes time to load).
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  processes = ['worker']
