description: Checkmate review engine — regression suite

prompts:
  - "ignored: review_diff is driven by test vars, not a rendered prompt"

providers:
  - id: file://provider.py:call_api
    label: checkmate-review
    config:
      pythonExecutable: C:\Users\chara\projects\checkmateai\.venv\Scripts\python.exe

defaultTest:
  assert:
    - type: is-json
    - type: javascript
      value: |
        const r = JSON.parse(output);
        return typeof r.summary === 'string' && Array.isArray(r.findings);

tests:
  # ─────────── Security ───────────
  - description: SQL injection in user lookup
    vars:
      repo: eval/demo
      pr_number: 1
      pr_title: Add user lookup endpoint
      diff: |
        diff --git a/app/users.py b/app/users.py
        @@ -5,0 +6,4 @@
        +def get_user(user_id):
        +    row = db.query(f"SELECT * FROM users WHERE id = {user_id}")
        +    return row
      expected_category: security
    assert:
      - type: python
        value: file://assertions.py:finds_category
      - type: python
        value: file://assertions.py:finds_severity_at_least
        metric: high_severity

  - description: Missing auth check on admin endpoint
    vars:
      repo: eval/demo
      pr_number: 2
      pr_title: Add admin delete endpoint
      diff: |
        diff --git a/app/admin.py b/app/admin.py
        @@ -0,0 +1,5 @@
        +@app.route("/admin/delete_user/<user_id>", methods=["POST"])
        +def admin_delete(user_id):
        +    db.execute(f"DELETE FROM users WHERE id = {user_id}")
        +    return {"deleted": user_id}
      expected_category: security
    assert:
      - type: python
        value: file://assertions.py:finds_category

  - description: Path traversal in file serve
    vars:
      repo: eval/demo
      pr_number: 3
      pr_title: Serve uploaded files
      diff: |
        diff --git a/app/files.py b/app/files.py
        @@ -0,0 +1,4 @@
        +def download(filename):
        +    path = "/uploads/" + filename
        +    with open(path, "rb") as f:
        +        return f.read()
      expected_category: security
    assert:
      - type: python
        value: file://assertions.py:finds_category

  - description: Hardcoded API key
    vars:
      repo: eval/demo
      pr_number: 4
      pr_title: Add third-party integration
      diff: |
        diff --git a/app/billing.py b/app/billing.py
        @@ -0,0 +1,5 @@
        +import stripe
        +
        +STRIPE_KEY = "STRIPE_LIVE_KEY_PLACEHOLDER_DO_NOT_USE"
        +stripe.api_key = STRIPE_KEY
        +
      expected_category: security
    assert:
      - type: python
        value: file://assertions.py:finds_category

  # ─────────── Bugs / Resource leaks ───────────
  - description: Unclosed file handle
    vars:
      repo: eval/demo
      pr_number: 5
      pr_title: Read config file
      diff: |
        diff --git a/app/config_loader.py b/app/config_loader.py
        @@ -0,0 +1,4 @@
        +def load_config(path):
        +    f = open(path)
        +    data = f.read()
        +    return json.loads(data)
    assert:
      - type: javascript
        value: |
          const r = JSON.parse(output);
          return r.findings.length >= 1 && r.findings.some(f =>
            f.category === 'bug' || f.category === 'error-handling' || f.category === 'maintainability'
          );

  - description: Division by zero not guarded
    vars:
      repo: eval/demo
      pr_number: 6
      pr_title: Add averaging helper
      diff: |
        diff --git a/app/stats.py b/app/stats.py
        @@ -0,0 +1,3 @@
        +def average(values):
        +    return sum(values) / len(values)
      expected_category: bug
    assert:
      - type: python
        value: file://assertions.py:finds_category

  - description: Race condition on shared dict
    vars:
      repo: eval/demo
      pr_number: 7
      pr_title: Add in-memory cache
      diff: |
        diff --git a/app/cache.py b/app/cache.py
        @@ -0,0 +1,7 @@
        +_cache = {}
        +
        +def get_or_set(key, fetch):
        +    if key in _cache:
        +        return _cache[key]
        +    _cache[key] = fetch()
        +    return _cache[key]
      expected_categories: [concurrency, bug]
    assert:
      - type: python
        value: file://assertions.py:finds_category

  # ─────────── Performance ───────────
  - description: N+1 query in hot path
    vars:
      repo: eval/demo
      pr_number: 8
      pr_title: Render user list
      diff: |
        diff --git a/app/views.py b/app/views.py
        @@ -0,0 +1,6 @@
        +def list_users_with_posts():
        +    users = User.query.all()
        +    for u in users:
        +        u.posts = Post.query.filter_by(user_id=u.id).all()
        +    return users
      expected_category: performance
    assert:
      - type: python
        value: file://assertions.py:finds_category

  # ─────────── Error handling ───────────
  - description: Swallowed exception
    vars:
      repo: eval/demo
      pr_number: 9
      pr_title: Silence parsing errors
      diff: |
        diff --git a/app/parser.py b/app/parser.py
        @@ -0,0 +1,5 @@
        +def parse(text):
        +    try:
        +        return json.loads(text)
        +    except Exception:
        +        pass
      expected_category: error-handling
    assert:
      - type: python
        value: file://assertions.py:finds_category

  - description: Retry retries non-retryable errors
    vars:
      repo: eval/demo
      pr_number: 10
      pr_title: Add retry wrapper
      diff: |
        diff --git a/app/retry.py b/app/retry.py
        @@ -0,0 +1,9 @@
        +def retry(fn, attempts=3):
        +    for i in range(attempts):
        +        try:
        +            return fn()
        +        except Exception:
        +            if i == attempts - 1:
        +                raise
        +            time.sleep(2 ** i)
      expected_categories: [error-handling, bug]
    assert:
      - type: python
        value: file://assertions.py:finds_category

  # ─────────── Clean diffs (must not fire) ───────────
  - description: Trivial string formatter (clean)
    vars:
      repo: eval/demo
      pr_number: 11
      pr_title: Add name formatter
      diff: |
        diff --git a/app/format.py b/app/format.py
        @@ -0,0 +1,2 @@
        +def format_name(first, last):
        +    return f"{first} {last}".strip()
    assert:
      - type: python
        value: file://assertions.py:no_false_positives

  - description: Simple getter with validation (clean)
    vars:
      repo: eval/demo
      pr_number: 12
      pr_title: Add typed getter
      diff: |
        diff --git a/app/util.py b/app/util.py
        @@ -0,0 +1,6 @@
        +import os
        +
        +def get_env_int(key: str, default: int = 0) -> int:
        +    raw = os.environ.get(key)
        +    if raw is None:
        +        return default
        +    try:
        +        return int(raw)
        +    except ValueError:
        +        return default
    assert:
      - type: python
        value: file://assertions.py:no_false_positives

  # ─────────── API / contract ───────────
  - description: Breaking change — removed required field
    vars:
      repo: eval/demo
      pr_number: 13
      pr_title: Slim down user response
      pr_body: |
        Removes the `email` field from the public user serializer. Consumers
        include the mobile apps and the admin dashboard.
      diff: |
        diff --git a/app/serializers.py b/app/serializers.py
        @@ -1,6 +1,5 @@
         def serialize_user(u):
             # Public user response — used by mobile app v2 and admin dashboard.
             return {
                 "id": u.id,
        -        "email": u.email,
                 "name": u.name,
             }
    assert:
      - type: javascript
        value: |
          const r = JSON.parse(output);
          return r.findings.some(f => f.category === 'api' || f.category === 'maintainability' || f.category === 'bug');

  # ─────────── Performance — unbounded ───────────
  - description: Unbounded recursion depth
    vars:
      repo: eval/demo
      pr_number: 14
      pr_title: Walk directory tree
      diff: |
        diff --git a/app/walk.py b/app/walk.py
        @@ -0,0 +1,6 @@
        +def walk(path, results=None):
        +    results = results or []
        +    for entry in os.listdir(path):
        +        full = os.path.join(path, entry)
        +        results.extend(walk(full))
        +    return results
      expected_category: bug
    assert:
      - type: javascript
        value: |
          const r = JSON.parse(output);
          return r.findings.some(f =>
            f.category === 'bug' || f.category === 'performance' || f.category === 'error-handling'
          );
